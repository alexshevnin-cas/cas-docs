<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>CAS.AI — Product Architecture Research</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 48px 80px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: -0.5px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 16px;
      margin-bottom: 8px;
    }
    h2 {
      font-size: 24px;
      font-weight: 600;
      color: #e6edf3;
      margin-top: 48px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #21262d;
    }
    h3 {
      font-size: 20px;
      font-weight: 600;
      color: #e6edf3;
      margin-top: 32px;
      margin-bottom: 12px;
    }
    h4 {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
      margin-top: 24px;
      margin-bottom: 8px;
    }
    p {
      margin-bottom: 12px;
    }
    blockquote {
      border-left: 3px solid #3b82f6;
      padding: 8px 16px;
      margin: 16px 0;
      color: #8b949e;
      background: #161b22;
      border-radius: 0 6px 6px 0;
    }
    blockquote strong {
      color: #c9d1d9;
    }
    pre {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 16px 0;
      font-size: 13px;
      line-height: 1.5;
    }
    code {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
    }
    p code, li code, td code {
      background: #21262d;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    th {
      background: #161b22;
      color: #e6edf3;
      font-weight: 600;
      text-align: left;
      padding: 10px 12px;
      border: 1px solid #21262d;
    }
    td {
      padding: 8px 12px;
      border: 1px solid #21262d;
      vertical-align: top;
    }
    tr:nth-child(even) {
      background: #0d1117;
    }
    tr:nth-child(odd) {
      background: #161b22;
    }
    ul, ol {
      margin: 8px 0 12px 24px;
    }
    li {
      margin-bottom: 4px;
    }
    strong {
      color: #e6edf3;
    }
    hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 32px 0;
    }
    a {
      color: #58a6ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .meta {
      color: #7d8590;
      font-size: 13px;
      margin-bottom: 32px;
    }

    /* TOC */
    .toc {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 20px 24px;
      margin: 24px 0 32px;
    }
    .toc-title {
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 8px;
    }
    .toc ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .toc li {
      margin: 4px 0;
    }
    .toc li.indent {
      margin-left: 20px;
    }
    .toc a {
      color: #58a6ff;
      font-size: 14px;
    }

    /* Print */
    @media print {
      body { background: #fff; color: #1a1a1a; }
      pre { border-color: #ddd; background: #f6f6f6; }
      th { background: #f0f0f0; border-color: #ddd; }
      td { border-color: #ddd; }
      blockquote { border-left-color: #3b82f6; background: #f8f9fa; }
      strong { color: #1a1a1a; }
      h1,h2,h3,h4 { color: #1a1a1a; }
      code { background: #f0f0f0; }
    }
  </style>
</head>
<body>
  <div class="container" id="content"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script>
    const md = `PLACEHOLDER`;

    async function render() {
      const res = await fetch('product-architecture.md');
      let text;
      if (res.ok) {
        text = await res.text();
      } else {
        // fallback: inline
        text = md;
      }
      document.getElementById('content').innerHTML = marked.parse(text);
    }
    render();
  </script>
</body>
</html>
